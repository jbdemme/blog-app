name: End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfiles

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Set up environment file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.test
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env.test
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.test
          echo "NODE_ENV=test" >> .env.test

      - name: Verify environment setup
        run: |
          echo "Checking .env.test file:"
          cat .env.test | sed 's/=.*/=***/' 
          echo ""
          echo "DATABASE_URL secret exists: ${{ secrets.DATABASE_URL != '' }}"
          echo "NEXTAUTH_SECRET secret exists: ${{ secrets.NEXTAUTH_SECRET != '' }}"
          echo "NEXTAUTH_URL secret exists: ${{ secrets.NEXTAUTH_URL != '' }}"
          echo ""
          echo "Checking if DATABASE_URL is loaded from file:"
          if grep -q "DATABASE_URL=" .env.test; then
            echo "✓ DATABASE_URL found in .env.test"
          else
            echo "✗ DATABASE_URL NOT found in .env.test"
          fi

      - name: Run database migrations
        run: pnpm exec drizzle-kit push

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30